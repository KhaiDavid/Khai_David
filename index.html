<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Linh Kiện 90</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        :root {
            --primary-color: #00ff88;
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --card-bg: #334155;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1 { text-align: center; color: var(--primary-color); text-transform: uppercase; letter-spacing: 2px; }

        /* THANH TÌM KIẾM */
        .search-container {
            max-width: 600px;
            margin: 0 auto 30px;
            display: flex;
            gap: 10px;
        }

        #searchInput {
            flex: 1;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid var(--card-bg);
            background: var(--panel-bg);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        #searchInput:focus { border-color: var(--primary-color); box-shadow: 0 0 10px rgba(0,255,136,0.2); }

        .search-btn {
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            background: var(--primary-color);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-btn:hover { transform: scale(1.05); background: #00cc6e; }

        /* BỐ CỤC 3 PANEL LINH KIỆN */
        .main-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #334155;
        }

        .panel h2 { 
            text-align: center; 
            font-size: 1.1rem; 
            color: var(--text-dim);
            margin-top: 0;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        /* GRID 3 HÀNG X 10 CỘT */
        .grid-container {
    display: grid;
        /* Mỗi cột chỉ rộng đúng 60px thay vì tự co giãn */
        grid-template-columns: repeat(3, 100px); 
        /* Mỗi hàng cao đúng 60px */
        grid-template-rows: repeat(10, 100px); 
        gap: 8px;
        margin-top: 15px;
        /* Căn giữa các ô vào giữa Panel */
        justify-content: center;
        }

    .cell {
        width: 100%;       /* Chiếm hết 60px đã thiết lập ở trên */
        height: 100%;      /* Chiếm hết 60px đã thiết lập ở trên */
        background: var(--card-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        cursor: pointer;
        /* Giảm chữ xuống 10px hoặc 9px để trông tinh tế hơn */
        font-size: 20px;   
        font-weight: 700;
        transition: all 0.3s ease;
        color: var(--text-dim);
        text-align: center;
        word-break: break-all; /* Nếu tên dài quá nó sẽ tự xuống dòng */
        padding: 2px;
    }

        .cell:hover { transform: translateY(-3px); border-color: var(--primary-color); color: #fff; }

        /* HIỆU ỨNG TÌM KIẾM */
        .dim-mode .cell { opacity: 0.2; filter: blur(1px); }
        .dim-mode .cell.active { 
            opacity: 1; 
            filter: none; 
            background: var(--primary-color); 
            color: #000; 
            box-shadow: 0 0 20px var(--primary-color);
            transform: scale(1.15);
            z-index: 10;
        }

        /* 3 PANEL THÔNG TIN PHÍA DƯỚI */
        .info-footer {
            display: grid;
            grid-template-columns: 1fr 2fr 1.5fr;
            gap: 15px;
            margin-top: auto; /* Đẩy xuống cuối */
            padding: 20px;
            background: #0b1120;
            border-radius: 15px;
            border: 1px solid #1e293b;
        }

        .info-box {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--card-bg);
            transition: 0.3s;
        }

        .info-box.highlight-box { border-left-color: var(--primary-color); }

        .info-box h4 { margin: 0 0 8px 0; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }
        .info-box p { margin: 0; font-size: 1.05rem; line-height: 1.4; }

        .found-text { color: var(--primary-color); font-weight: bold; }

    </style>
</head>
<body>

    <h1>Kho Linh Kiện Điện Tử</h1>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Nhập tên linh kiện cần tìm..." onkeyup="if(event.key==='Enter') performSearch()">
        <button class="search-btn" onclick="performSearch()">TÌM KIẾM</button>
    </div>

    <div class="main-layout" id="mainLayout">
        </div>

    <div class="info-footer">
        <div class="info-box" id="boxPos">
            <h4>Vị trí linh kiện</h4>
            <p id="txtPos">---</p>
        </div>
        <div class="info-box" id="boxFunc">
            <h4>Chức năng chi tiết</h4>
            <p id="txtFunc">Chọn một linh kiện để xem thông tin.</p>
        </div>
        <div class="info-box" id="boxStatus">
            <h4>Trạng thái thông báo</h4>
            <p id="txtStatus">Hệ thống sẵn sàng.</p>
        </div>
    </div>

    <script>
        // 1. Dữ liệu 90 linh kiện (Bạn có thể thay đổi tên/mô tả ở đây)
        const components = [];
        const types = ["Resistor", "Capacitor", "IC", "Transistor", "LED", "Diode", "Sensor", "Relay", "Switch", "Inductor"];

        for (let i = 1; i <= 90; i++) {
            let type = types[Math.floor(Math.random() * types.length)];
            components.push({
                id: i,
                name: `${type}${i}`,
                function: `Đây là linh kiện ${type} số ${i}, có vai trò quan trọng trong việc điều phối tín hiệu và bảo vệ mạch điện tử.`,
                panel: Math.ceil(i / 30),
                pos: `Panel ${Math.ceil(i / 30)} - Hàng ${Math.ceil(((i-1)%30 + 1) / 10)} - Cột ${(i-1) % 10 + 1}`
            });
        }

        // Cấu hình Fuse.js để tìm kiếm không cần chính xác 100%
        const fuse = new Fuse(components, { keys: ['name'], threshold: 0.4 });

        // 2. Render Giao diện
        function init() {
            const layout = document.getElementById('mainLayout');
            for (let p = 1; p <= 3; p++) {
                const panelDiv = document.createElement('div');
                panelDiv.className = 'panel';
                panelDiv.innerHTML = `<h2>PANEL ${p}</h2><div class="grid-container" id="grid-${p}"></div>`;
                layout.appendChild(panelDiv);

                const grid = panelDiv.querySelector('.grid-container');
                components.filter(c => c.panel === p).forEach(comp => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `comp-${comp.id}`;
                    cell.innerText = comp.name;
                    cell.onclick = () => {
                        highlightComponent(comp);
                        updateInfo(comp, `Đang xem: ${comp.name}`);
                    };
                    grid.appendChild(cell);
                });
            }
        }

        // 3. Logic Tìm kiếm & Cập nhật Panel thông tin
        function performSearch() {
            const query = document.getElementById('searchInput').value;
            const results = fuse.search(query);

            if (results.length > 0) {
                const item = results[0].item;
                highlightComponent(item);
                updateInfo(item, `Đã tìm thấy linh kiện: ${item.name}`);
                // Tự động cuộn đến linh kiện nếu nó ở xa
                document.getElementById(`comp-${item.id}`).scrollIntoView({behavior: 'smooth', block: 'center'});
            } else {
                resetEffects();
                updateInfo(null, "Không tìm thấy linh kiện nào khớp!");
            }
        }

        function highlightComponent(comp) {
            resetEffects();
            document.body.classList.add('dim-mode');
            document.getElementById(`comp-${comp.id}`).classList.add('active');
        }

        function resetEffects() {
            document.body.classList.remove('dim-mode');
            document.querySelectorAll('.cell').forEach(el => el.classList.remove('active'));
        }

        function updateInfo(comp, statusMsg) {
            const txtPos = document.getElementById('txtPos');
            const txtFunc = document.getElementById('txtFunc');
            const txtStatus = document.getElementById('txtStatus');

            if (comp) {
                txtPos.innerText = comp.pos;
                txtFunc.innerText = comp.function;
                txtStatus.innerHTML = `<span class="found-text">${statusMsg}</span>`;
                // Thêm hiệu ứng highlight cho các box bên dưới
                document.querySelectorAll('.info-box').forEach(b => b.classList.add('highlight-box'));
            } else {
                txtPos.innerText = "---";
                txtFunc.innerText = "Vui lòng nhập lại tên linh kiện.";
                txtStatus.innerText = statusMsg;
                document.querySelectorAll('.info-box').forEach(b => b.classList.remove('highlight-box'));
            }
        }

        // Khởi tạo web
        init();
    </script>
</body>
</html>
